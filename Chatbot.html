<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple AI Chatbot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #eef2f7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .chat-container {
        width: 400px;
        max-width: 95%;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .header {
        background: #4f46e5;
        color: white;
        text-align: center;
        padding: 18px;
      }

      .chat-box {
        height: 450px;
        overflow-y: auto;
        padding: 15px;
        background: #f8fafc;
      }

      .user-message,
      .bot-message {
        margin: 10px 0;
        padding: 10px 14px;
        border-radius: 10px;
        width: fit-content;
        max-width: 80%;
        line-height: 1.5;
      }

      .user-message {
        background: #4f46e5;
        color: white;
        margin-left: auto;
      }

      .bot-message {
        background: #e2e8f0;
        color: #222;
      }

      .input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
      }

      input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        font-size: 15px;
      }

      button {
        margin-left: 10px;
        padding: 12px 18px;
        border: none;
        background: #4f46e5;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="header">
        <h2>🤖 AI Chatbot</h2>
      </div>

      <div class="chat-box" id="chatBox">
        <div class="bot-message">Hello! Ask me anything.</div>
      </div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your question..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const API_KEY = "AQ.Ab8RN6JcmxXWXXumjRQQ_tE3dwmzIBteY3x_I0yHgcLd99BTOw";

      const chatBox = document.getElementById("chatBox");
      const userInput = document.getElementById("userInput");

      let chatHistory = [];

      // Add message to chat screen
      function addMessage(message, className) {
        const div = document.createElement("div");

        div.className = className;

        div.innerText = message;

        chatBox.appendChild(div);

        chatBox.scrollTop = chatBox.scrollHeight;
      }

      // Send message to Gemini
      async function sendMessage() {
        const message = userInput.value.trim();

        if (message === "") {
          return;
        }

        // Show user message
        addMessage(message, "user-message");

        userInput.value = "";

        // Loading message
        const loading = document.createElement("div");

        loading.className = "bot-message";

        loading.innerText = "Thinking...";

        chatBox.appendChild(loading);

        // Store user message
        chatHistory.push({
          role: "user",

          parts: [
            {
              text: message,
            },
          ],
        });

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,

            {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                contents: chatHistory,

                generationConfig: {
                  temperature: 0.7,

                  maxOutputTokens: 500,
                },
              }),
            },
          );

          const data = await response.json();

          loading.remove();

          // Check API error

          if (!response.ok) {
            addMessage(
              data.error?.message || "API Error",

              "bot-message",
            );

            console.log(data);

            return;
          }

          // Get Gemini answer

          const reply = data.candidates[0].content.parts[0].text;

          // Save Gemini reply

          chatHistory.push({
            role: "model",

            parts: [
              {
                text: reply,
              },
            ],
          });

          // Show bot message

          addMessage(reply, "bot-message");
        } catch (error) {
          loading.remove();

          addMessage(
            "Something went wrong. Check your API key or internet connection.",

            "bot-message",
          );

          console.error(error);
        }
      }

      // Press Enter to send

      userInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();

          sendMessage();
        }
      });
    </script>
  </body>
</html>
