<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let traffic = prompt("Enter which signal appearing.....");

      if (traffic === "red") {
        console.log("Stop Immediately");
      } else if (traffic === "yellow") {
        console.log("Slow down and prepare to stop");
      } else if (traffic === "green") {
        console.log("Go Safely");
      } else {
        console.log("stay in traffic");
      }
    </script>
  </body>
</html>
